name: CI (Docker)

# Delegates to the shared Docker CI workflow in Infrastructure-Common.
# Kept as a local file so tag.yml can reference it with a local path,
# mirroring the pattern used by ci.yml for unit tests.
on:
  pull_request:
    branches: [ main, master ]
  workflow_call:

jobs:
  ci-docker:
    uses: VitaliiAndreev/Infrastructure-Common/.github/workflows/ci-powershell-docker.yml@master
