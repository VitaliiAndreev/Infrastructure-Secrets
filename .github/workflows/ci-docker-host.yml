name: CI (Docker host)

# Delegates to the shared Docker host CI workflow in Infrastructure-Common.
# Kept as a local file so release.yml can reference it with a local path,
# mirroring the pattern used by ci.yml for unit tests.
on:
  pull_request:
    branches: [ main, master ]
  workflow_call:
  workflow_dispatch:

jobs:
  ci-docker-host:
    uses: VitaliiAndreev/Infrastructure-Common/.github/workflows/ci-powershell-docker-host.yml@master
