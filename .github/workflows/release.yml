name: Release

on:
  push:
    branches:
      - master
    paths:
      # Only fire when the manifest itself changes, not on every push.
      - 'Infrastructure.Secrets/Infrastructure.Secrets.psd1'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: windows-latest
    outputs:
      version_is_new: ${{ steps.check.outputs.version_is_new }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: check
        uses: VitaliiAndreev/Infrastructure-Common/.github/actions/check-version-is-new@master
        with:
          psd1: 'Infrastructure.Secrets\Infrastructure.Secrets.psd1'

  test-unit:
    needs: check-version
    if: needs.check-version.outputs.version_is_new == 'true'
    uses: ./.github/workflows/ci.yml

  test-integration:
    needs: check-version
    if: needs.check-version.outputs.version_is_new == 'true'
    uses: ./.github/workflows/ci-docker.yml

  tag:
    needs: [ check-version, test-unit, test-integration ]
    if: needs.check-version.outputs.version_is_new == 'true'
    permissions:
      contents: write
    uses: VitaliiAndreev/Infrastructure-Common/.github/workflows/tag.yml@master
    with:
      psd1: 'Infrastructure.Secrets\Infrastructure.Secrets.psd1'

  publish:
    needs: tag
    if: needs.tag.outputs.tag_created == 'true'
    uses: VitaliiAndreev/Infrastructure-Common/.github/workflows/publish.yml@master
    with:
      module-path: Infrastructure.Secrets
    secrets:
      PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
