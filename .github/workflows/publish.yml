name: Publish to PSGallery

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Publish module
        shell: pwsh
        run: .\Publish.ps1 -ApiKey ${{ secrets.PSGALLERY_API_KEY }}
